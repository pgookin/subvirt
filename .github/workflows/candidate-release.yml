name: Candidate release

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: Unique build ID, for example 2026.06.30-1
        required: true
      ref:
        description: Git ref to build. Defaults to the branch or tag that triggered the workflow.
        required: false
        default: ""
      refresh_sources:
        description: Refresh generated libvirt sources before building
        required: false
        default: "false"
      ubuntu_version:
        description: Ubuntu 24.04 libvirt package version to refresh, when refresh_sources=true
        required: false
      ubuntu_versions:
        description: Comma-separated target=version map, for example ubuntu-24.04=10.0.0-2ubuntu8.14
        required: false
      ubuntu_targets:
        description: Comma-separated Ubuntu targets to build, or all/standard
        required: false
        default: "ubuntu-24.04"
      alma_version:
        description: AlmaLinux 10 libvirt package version to refresh, when refresh_sources=true
        required: false
      alma_versions:
        description: Comma-separated target=version map, for example almalinux-10=11.10.0-12.el10_2.alma.1
        required: false
      alma_targets:
        description: Comma-separated AlmaLinux targets to build, or all
        required: false
        default: "almalinux-10"
      promote_stable:
        description: Publish to public stable after deterministic tests pass
        required: false
        default: "false"
      require_codex_gate:
        description: Require Codex review to pass before stable publish
        required: false
        default: "false"
      build_scope:
        description: "Build scope: full or provider"
        required: false
        default: "full"

env:
  SUBVIRT_RELEASE_CONFIG: ${{ vars.SUBVIRT_RELEASE_CONFIG || '/srv/subvirt/release/release.json' }}

jobs:
  release:
    runs-on: [self-hosted, subvirt-build]
    concurrency: subvirt-release
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref_name }}
      - name: Run candidate release
        env:
          BUILD_ID: ${{ inputs.build_id }}
          REF: ${{ inputs.ref || github.ref_name }}
          REFRESH_SOURCES: ${{ inputs.refresh_sources }}
          UBUNTU_VERSION: ${{ inputs.ubuntu_version }}
          UBUNTU_VERSIONS: ${{ inputs.ubuntu_versions }}
          UBUNTU_TARGETS: ${{ inputs.ubuntu_targets }}
          ALMA_VERSION: ${{ inputs.alma_version }}
          ALMA_VERSIONS: ${{ inputs.alma_versions }}
          ALMA_TARGETS: ${{ inputs.alma_targets }}
          PROMOTE_STABLE: ${{ inputs.promote_stable }}
          REQUIRE_CODEX_GATE: ${{ inputs.require_codex_gate }}
          BUILD_SCOPE: ${{ inputs.build_scope }}
        run: ./scripts/run-candidate-release.sh
      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: release-evidence-${{ inputs.build_id }}
          path: artifacts/${{ inputs.build_id }}/
