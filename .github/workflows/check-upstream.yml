name: Check upstream libvirt

on:
  schedule:
    - cron: "23 */8 * * *"
  workflow_dispatch:
    inputs:
      finalize:
        description: Merge the refresh PR and promote stable after tests pass
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

env:
  SUBVIRT_RELEASE_CONFIG: ${{ vars.SUBVIRT_RELEASE_CONFIG || '/srv/subvirt/release/release.json' }}
  FINALIZE_UPSTREAM_REFRESH: ${{ github.event_name == 'schedule' || inputs.finalize }}

jobs:
  check:
    runs-on: [self-hosted, subvirt-build]
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Check local mirrors
        id: check
        shell: bash
        run: |
          set +e
          ./scripts/check-upstream.py --config "$SUBVIRT_RELEASE_CONFIG" --lock release/upstream-lock.json --json-output upstream-report.json
          rc=$?
          set -e
          cat upstream-report.json >> "$GITHUB_STEP_SUMMARY"
          if [ "$rc" = "10" ]; then
            echo "updates_available=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          exit "$rc"
      - name: Update upstream lock
        if: steps.check.outputs.updates_available == 'true'
        run: ./scripts/update-upstream-lock.py --report upstream-report.json --lock release/upstream-lock.json --version-manifest release/subvirt-version.json
      - name: Derive candidate release inputs
        if: steps.check.outputs.updates_available == 'true'
        id: release_inputs
        run: ./scripts/lock-release-inputs.py --report upstream-report.json --github-output "$GITHUB_OUTPUT"
      - name: Refresh source inputs and manifests
        if: steps.check.outputs.updates_available == 'true'
        env:
          BUILD_ID: ${{ steps.release_inputs.outputs.build_id }}
          REF: ${{ github.sha }}
          UBUNTU_VERSION: ${{ steps.release_inputs.outputs.ubuntu_version }}
          ALMA_VERSION: ${{ steps.release_inputs.outputs.alma_version }}
          BUILD_UBUNTU: ${{ steps.release_inputs.outputs.build_ubuntu }}
          BUILD_ALMA: ${{ steps.release_inputs.outputs.build_alma }}
        run: |
          set -euo pipefail
          if [ "$BUILD_UBUNTU" = "true" ]; then
            ./scripts/refresh-libvirt-source.py --config "$SUBVIRT_RELEASE_CONFIG" --distro ubuntu --version "$UBUNTU_VERSION"
          fi
          if [ "$BUILD_ALMA" = "true" ]; then
            ./scripts/refresh-libvirt-source.py --config "$SUBVIRT_RELEASE_CONFIG" --distro alma --version "$ALMA_VERSION"
          fi
          ./scripts/write-upstream-manifest.py --report upstream-report.json --changed-only
      - name: Create upstream refresh PR
        if: steps.check.outputs.updates_available == 'true'
        id: refresh_pr
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          branch: automation/upstream-libvirt-refresh
          delete-branch: true
          commit-message: Update tracked upstream libvirt versions
          title: Update tracked upstream libvirt versions
          body-path: upstream-report.json
          add-paths: |
            release/upstream-lock.json
            release/subvirt-version.json
            release/upstream-manifests/**
      - name: Run trusted candidate release without stable promotion
        if: steps.check.outputs.updates_available == 'true' && steps.refresh_pr.outputs.pull-request-number != ''
        env:
          BUILD_ID: ${{ steps.release_inputs.outputs.build_id }}
          REF: ${{ steps.refresh_pr.outputs.pull-request-branch }}
          REFRESH_SOURCES: "true"
          UBUNTU_VERSION: ${{ steps.release_inputs.outputs.ubuntu_version }}
          ALMA_VERSION: ${{ steps.release_inputs.outputs.alma_version }}
          BUILD_UBUNTU: ${{ steps.release_inputs.outputs.build_ubuntu }}
          BUILD_ALMA: ${{ steps.release_inputs.outputs.build_alma }}
          PROMOTE_STABLE: "false"
        run: ./scripts/run-candidate-release.sh
      - name: Comment candidate success
        if: steps.check.outputs.updates_available == 'true' && steps.refresh_pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          BUILD_ID: ${{ steps.release_inputs.outputs.build_id }}
          PR_NUMBER: ${{ steps.refresh_pr.outputs.pull-request-number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          FINALIZE: ${{ env.FINALIZE_UPSTREAM_REFRESH }}
        run: |
          gh pr comment "$PR_NUMBER" --body "Candidate build \`$BUILD_ID\` passed. Evidence: $RUN_URL. Finalize enabled: \`$FINALIZE\`."
      - name: Publish tested build to public stable
        if: steps.check.outputs.updates_available == 'true' && steps.refresh_pr.outputs.pull-request-number != '' && env.FINALIZE_UPSTREAM_REFRESH == 'true'
        env:
          BUILD_ID: ${{ steps.release_inputs.outputs.build_id }}
        run: |
          set -euo pipefail
          ./scripts/verify-release-evidence.py --build-id "$BUILD_ID" --scope auto
          ./scripts/release.py publish-public-stable --config "$SUBVIRT_RELEASE_CONFIG" --build-id "$BUILD_ID" --execute
          ./scripts/release.py verify-public-stable --config "$SUBVIRT_RELEASE_CONFIG" --build-id "$BUILD_ID" --execute
      - name: Merge upstream refresh PR
        if: steps.check.outputs.updates_available == 'true' && steps.refresh_pr.outputs.pull-request-number != '' && env.FINALIZE_UPSTREAM_REFRESH == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.refresh_pr.outputs.pull-request-number }}
        run: gh pr merge "$PR_NUMBER" --squash --delete-branch
      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: upstream-report
          path: upstream-report.json
      - uses: actions/upload-artifact@v7.0.1
        if: always() && steps.check.outputs.updates_available == 'true'
        with:
          name: upstream-candidate-evidence-${{ steps.release_inputs.outputs.build_id }}
          path: artifacts/${{ steps.release_inputs.outputs.build_id }}/
