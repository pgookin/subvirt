name: Check upstream libvirt

on:
  schedule:
    - cron: "17 */8 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  SUBVIRT_RELEASE_CONFIG: ${{ vars.SUBVIRT_RELEASE_CONFIG || '/srv/subvirt/release/release.json' }}

jobs:
  check:
    runs-on: [self-hosted, subvirt-build]
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Check local mirrors
        id: check
        shell: bash
        run: |
          set +e
          ./scripts/check-upstream.py --config "$SUBVIRT_RELEASE_CONFIG" --lock release/upstream-lock.json --json-output upstream-report.json
          rc=$?
          set -e
          cat upstream-report.json >> "$GITHUB_STEP_SUMMARY"
          if [ "$rc" = "10" ]; then
            echo "updates_available=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          exit "$rc"
      - name: Update upstream lock
        if: steps.check.outputs.updates_available == 'true'
        run: ./scripts/update-upstream-lock.py --report upstream-report.json --lock release/upstream-lock.json
      - name: Derive candidate release inputs
        if: steps.check.outputs.updates_available == 'true'
        id: release_inputs
        run: ./scripts/lock-release-inputs.py --report upstream-report.json --github-output "$GITHUB_OUTPUT"
      - name: Create upstream refresh PR
        if: steps.check.outputs.updates_available == 'true'
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          branch: automation/upstream-libvirt-refresh
          delete-branch: true
          commit-message: Update tracked upstream libvirt versions
          title: Update tracked upstream libvirt versions
          body-path: upstream-report.json
          add-paths: release/upstream-lock.json
      - name: Run trusted candidate release without stable promotion
        if: steps.check.outputs.updates_available == 'true'
        env:
          BUILD_ID: ${{ steps.release_inputs.outputs.build_id }}
          REF: ${{ github.sha }}
          REFRESH_SOURCES: "true"
          UBUNTU_VERSION: ${{ steps.release_inputs.outputs.ubuntu_version }}
          ALMA_VERSION: ${{ steps.release_inputs.outputs.alma_version }}
          BUILD_UBUNTU: ${{ steps.release_inputs.outputs.build_ubuntu }}
          BUILD_ALMA: ${{ steps.release_inputs.outputs.build_alma }}
          PROMOTE_STABLE: "false"
        run: ./scripts/run-candidate-release.sh
      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: upstream-report
          path: upstream-report.json
      - uses: actions/upload-artifact@v7.0.1
        if: always() && steps.check.outputs.updates_available == 'true'
        with:
          name: upstream-candidate-evidence-${{ steps.release_inputs.outputs.build_id }}
          path: artifacts/${{ steps.release_inputs.outputs.build_id }}/
