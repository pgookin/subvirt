name: Promote stable

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: Existing tested build ID to publish to public stable
        required: true
      scope:
        description: "Candidate scope: auto, provider, or full"
        required: false
        default: auto
      require_codex_gate:
        description: Require Codex review to pass before stable publish
        required: false
        default: false
        type: boolean

env:
  SUBVIRT_RELEASE_CONFIG: ${{ vars.SUBVIRT_RELEASE_CONFIG || '/srv/subvirt/release/release.json' }}

jobs:
  promote:
    runs-on: [self-hosted, subvirt-build]
    concurrency: subvirt-release
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Download tested candidate artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run download --repo "$GITHUB_REPOSITORY" --name "release-evidence-${{ inputs.build_id }}" --dir "artifacts/${{ inputs.build_id }}"
      - name: Promotion preflight
        run: ./scripts/release.py promotion-preflight --config "$SUBVIRT_RELEASE_CONFIG" --build-id "${{ inputs.build_id }}" --scope "${{ inputs.scope }}" --execute
      - name: Codex promotion gate
        continue-on-error: ${{ !inputs.require_codex_gate }}
        run: ./scripts/codex-release-gate.sh "${{ inputs.build_id }}"
      - name: Publish public stable
        run: ./scripts/release.py publish-public-stable --config "$SUBVIRT_RELEASE_CONFIG" --build-id "${{ inputs.build_id }}" --execute
      - name: Verify public stable
        run: ./scripts/release.py verify-public-stable --config "$SUBVIRT_RELEASE_CONFIG" --build-id "${{ inputs.build_id }}" --execute
      - name: Write promotion evidence
        run: ./scripts/release.py write-promotion-evidence --config "$SUBVIRT_RELEASE_CONFIG" --build-id "${{ inputs.build_id }}" --scope "${{ inputs.scope }}" --execute
      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: promotion-evidence-${{ inputs.build_id }}
          path: artifacts/${{ inputs.build_id }}/
