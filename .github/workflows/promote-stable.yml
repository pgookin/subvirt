name: Promote stable

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: Existing tested build ID to publish to public stable
        required: true

env:
  SUBVIRT_RELEASE_CONFIG: ${{ vars.SUBVIRT_RELEASE_CONFIG || '/srv/subvirt/release/release.json' }}

jobs:
  promote:
    runs-on: [self-hosted, subvirt-build]
    concurrency: subvirt-release
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Write release evidence
        run: ./scripts/write-release-evidence.py --build-id "${{ inputs.build_id }}"
      - name: Codex promotion gate
        run: ./scripts/codex-release-gate.sh "${{ inputs.build_id }}"
      - name: Publish public stable
        run: ./scripts/release.py publish-public-stable --config "$SUBVIRT_RELEASE_CONFIG" --build-id "${{ inputs.build_id }}" --execute
      - name: Verify public stable
        run: ./scripts/release.py verify-public-stable --config "$SUBVIRT_RELEASE_CONFIG" --build-id "${{ inputs.build_id }}" --execute
      - uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: promotion-evidence-${{ inputs.build_id }}
          path: artifacts/${{ inputs.build_id }}/
